spring.datasource.url=jdbc:mysql://85.98.94.161:27060/aktour_db?serverTimezone=UTC
spring.datasource.username=ius2026
spring.datasource.password=aktour2026
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# schema.sql drops all tables first; Hibernate then recreates them cleanly.
# After first successful startup: change to ddl-auto=update + sql.init.mode=never
spring.jpa.hibernate.ddl-auto=create-drop
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=false

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
server.port=8080

# Accept "GUIDE" / "guide" / "Guide" in JSON body
spring.jackson.mapper.accept-case-insensitive-enums=true

# Swagger UI at /swagger instead of /swagger-ui.html
springdoc.swagger-ui.path=/swagger
springdoc.api-docs.path=/api-docs

# Show error messages in responses
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
